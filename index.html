<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BG PUBLIC SCHOOL | Admin ERP</title>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;600;700&family=Inconsolata:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --navy: #0a1628; --dark: #0e1f3d; --mid: #162d52; 
            --card: #1a3460; --border: rgba(99,179,237,0.18); 
            --gold: #f6c90e; --blue: #63b3ed; --white: #f7fafc; 
            --red: #fc8181; --green: #48bb78;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Georgia', serif; background: radial-gradient(ellipse at 30% 20%, #0d2137 0%, var(--navy) 60%); color: var(--white); min-height: 100vh; padding: 20px; }
        .card { background: var(--dark); padding: 30px; border: 1px solid rgba(246,201,14,.25); border-radius: 16px; box-shadow: 0 32px 80px rgba(0,0,0,.7); margin-bottom: 20px; }
        
        .control-group { display: flex; flex-direction: column; gap: 4px; margin-bottom: 15px; }
        .control-group label { font-size: 10px; color: var(--blue); text-transform: uppercase; font-weight: 700; }
        .control-group input, .control-group select { padding: 12px; background: var(--mid); border: 1px solid var(--border); border-radius: 6px; color: white; outline: none; font-family: 'Inconsolata', monospace; }
        
        .btn-primary { width: 100%; padding: 14px; background: linear-gradient(135deg, var(--gold), #e6b800); color: var(--navy); border: none; border-radius: 8px; cursor: pointer; font-weight: 700; text-transform: uppercase; margin-top: 10px; }
        .btn-small { background: var(--blue); color: var(--navy); border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        
        .app-shell { max-width: 1100px; margin: 0 auto; display: none; }
        .view-section { display: none; }
        .view-section.active { display: block; }
        
        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 8px; overflow: hidden; margin-top: 20px; table-layout: fixed; }
        th, td { padding: 10px; border: 1px solid var(--border); text-align: center; font-size: 12px; word-wrap: break-word; }
        th { background: var(--mid); color: var(--gold); }
        .fail-row { background: rgba(252, 129, 129, 0.15) !important; }
        
        #individualReportContainer { display: none; margin-top: 30px; }
        #individualReport { background: #ffffff; color: #000000; padding: 30px; border-radius: 12px; }
        
        @media print {
            .no-print { display: none !important; }
            body { background: white !important; color: black !important; }
            table { border: 2px solid #000 !important; }
            th { background: #eee !important; color: black !important; }
            td { color: black !important; }
        }
    </style>
</head>
<body>

<div class="login-container" id="loginPage" style="max-width:400px; margin: 60px auto;">
    <div class="card">
        <h1 style="text-align:center; color:var(--gold); margin-bottom:20px;">BG PUBLIC SCHOOL</h1>
        <div class="control-group"><label>Teacher ID</label><input type="text" id="tid" placeholder="T-4, etc."></div>
        <div class="control-group"><label>PIN</label><input type="password" id="tpass" placeholder="bgps123"></div>
        <button class="btn-primary" onclick="loginTeacher()">Login</button>
    </div>
</div>

<div class="app-shell" id="appShell">
    <div class="card view-section active" id="entryView">
        <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px;">
            <div class="control-group"><label>Class</label><select id="class"></select></div>
            <div class="control-group"><label>Subject</label>
                <select id="subject">
                    <option value="">Select</option>
                    <option>English Literature</option><option>English Language</option>
                    <option>Hindi</option><option>Maths</option><option>Geography</option>
                    <option>History/Civics</option><option>Chemistry</option><option>Biology</option>
                    <option>Physics</option><option>GK/Msc</option><option>Computer</option>
                </select>
            </div>
            <div class="control-group"><label>Exam</label><select id="examType"><option>Unit Test 1</option><option>Unit Test 2</option><option>Half Yearly</option><option>Unit Test 3</option><option>Annual Exam</option></select></div>
        </div>
        <div id="studentContainer"></div>
        <button class="btn-primary" onclick="submitData()">Submit Marks</button>
    </div>

    <div class="card view-section" id="dashView">
        <select id="tabSelector" style="width:100%; padding:10px;"></select>
        <button class="btn-primary" onclick="fetchData()">Fetch Data</button>
        <table id="resTable"><thead id="tHead"></thead><tbody id="tBody"></tbody></table>
        
        <div id="reportContainer" style="display:none; margin-top:20px;">
            <button class="btn-small" onclick="document.getElementById('reportContainer').style.display='none'">Close</button>
            <div id="individualReport"></div>
        </div>
    </div>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwoFAw_Dr-c8Uez79RLT7wbfVZ5xhqUUrFlqkcN5j4FYUsiUaaoYoC4H9tldaoxoGMZ/exec";
    const mapping = {"T-1":"Playgroup","T-4":"Class 1","T-5":"Class 2","T-6":"Class 3","T-7":"Class 4","T-8":"Class 5","T-9":"Class 6","T-10":"Class 7","T-11":"Class 8","T-12":"Class 9","T-13":"Class 10","T-14":"Class 11","T-15":"Class 12","ADMIN":"ALL_CLASSES"};
    // Sequence set kar diya: Lit, Lang, Hindi...
    const customOrder = ["ENGLISH LITERATURE", "ENGLISH LANGUAGE", "HINDI", "MATHS", "GEOGRAPHY", "HISTORY/CIVICS", "CHEMISTRY", "BIOLOGY", "PHYSICS", "GK/MSC", "COMPUTER"];
    let globalStudents = {}, globalSubsArray = [], globalRankMap = {}, currentId = "";

    function loginTeacher() {
        let id = document.getElementById('tid').value.toUpperCase();
        let pass = document.getElementById('tpass').value;
        if (((id === "ADMIN" && pass === "Admin@1") || (id !== "ADMIN" && pass === "bgps123")) && mapping[id]) {
            currentId = id;
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('appShell').style.display = 'block';
            let classes = id === "ADMIN" ? ["Class 1", "Class 2", "Class 3", "Class 4", "Class 5", "Class 6", "Class 7", "Class 8", "Class 9", "Class 10", "Class 11", "Class 12"] : [mapping[id]];
            let exams = ["Unit Test 1", "Unit Test 2", "Half Yearly", "Unit Test 3", "Annual Exam"];
            
            let clsOps = id === "ADMIN" ? "<option value=''>Select Class</option>" : "";
            let dashOps = "";
            classes.forEach(c => {
                clsOps += `<option value="${c}">${c}</option>`;
                exams.forEach(ex => dashOps += `<option value="${c}|${ex}">${c} - ${ex}</option>`);
            });
            document.getElementById('class').innerHTML = clsOps;
            document.getElementById('tabSelector').innerHTML = dashOps;
            generateRows();
        } else { alert("Wrong Login Details!"); }
    }

    function generateRows() {
        let c = document.getElementById('studentContainer'); c.innerHTML = "";
        for(let i=1; i<=50; i++) c.innerHTML += `<div class="student-row"><span>Roll ${i}</span><input type="number" class="m-input" data-roll="${i}"></div>`;
    }

    async function submitData() {
        let entries = [];
        document.querySelectorAll('.m-input').forEach(i => { if(i.value) entries.push({ teacherId: currentId, class: document.getElementById('class').value, subject: document.getElementById('subject').value, examType: document.getElementById('examType').value, rollNo: i.dataset.roll, marks: i.value }); });
        if(entries.length == 0) return alert("Enter marks!");
        await fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(entries) });
        alert("Saved!");
    }

    async function fetchData() {
        let selection = document.getElementById('tabSelector').value; if(!selection) return alert("Select report!");
        let [cls, exam] = selection.split('|');
        let res = await fetch(WEB_APP_URL + "?tabName=Master"); let data = await res.json();
        let students = {}, allSubs = new Set();
        data.forEach(row => {
            if(row[2] == cls && row[4] == exam) {
                let roll = row[6], sub = row[3].toUpperCase();
                if(!students[roll]) students[roll] = { subs: {}, total: 0 };
                students[roll].subs[sub] = row[7]; students[roll].total += Number(row[7]); allSubs.add(sub);
            }
        });
        globalStudents = students; globalSubsArray = Array.from(allSubs).sort((a,b) => (customOrder.indexOf(a) - customOrder.indexOf(b)));
        let rolls = Object.keys(students).sort((a,b) => students[b].total - students[a].total);
        let rankMap = {}; rolls.forEach((r, idx) => rankMap[r] = idx + 1);
        
        let h = "<tr><th>ROLL</th>" + globalSubsArray.map(s => `<th>${s.split(' ')[0]}</th>`).join('') + "<th>TOT</th><th>RANK</th><th>ACT</th></tr>";
        document.getElementById('tHead').innerHTML = h;
        let b = "", sortedRolls = Object.keys(students).sort((a,b) => a-b);
        sortedRolls.forEach(r => {
            b += `<tr><td>${r}</td>` + globalSubsArray.map(s => `<td>${students[r].subs[s]||'-'}</td>`).join('') + `<td>${students[r].total}</td><td>#${rankMap[r]}</td><td><button class="btn-small" onclick="viewIndividualReport('${r}')">View</button></td></tr>`;
        });
        document.getElementById('tBody').innerHTML = b;
    }

    function viewIndividualReport(r) {
        let s = globalStudents[r];
        document.getElementById('individualReport').innerHTML = `<h3>Report: Roll ${r}</h3><table class="ir-table">${globalSubsArray.map(sub => `<tr><td>${sub}</td><td>${s.subs[sub]||'-'}</td></tr>`).join('')}</table><p>Total: ${s.total}</p>`;
        document.getElementById('reportContainer').style.display = 'block';
    }
</script>
</body>
</html>
