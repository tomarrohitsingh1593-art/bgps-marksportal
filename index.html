<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>BG PUBLIC SCHOOL | Marks ERP</title>

  <style>
    :root {
      --navy: #0a1628;
      --dark: #0e1f3d;
      --mid: #162d52;
      --card: #1a3460;
      --border: rgba(99, 179, 237, 0.22);
      --gold: #f6c90e;
      --blue: #63b3ed;
      --white: #f7fafc;
      --red: #fc8181;
      --green: #48bb78;
      --muted: #a0aec0;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Georgia, serif;
      background: radial-gradient(ellipse at 30% 20%, #0d2137 0%, var(--navy) 60%);
      color: var(--white);
      min-height: 100vh;
      padding: 20px;
    }

    .card {
      background: var(--dark);
      padding: 24px;
      border: 1px solid rgba(246, 201, 14, 0.25);
      border-radius: 16px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.55);
      margin-bottom: 20px;
    }

    .school-logo {
      width: 92px;
      height: 92px;
      margin: 0 auto 18px;
      border-radius: 50%;
      background: var(--mid);
      border: 3px solid var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--gold);
      font-weight: 800;
      font-size: 22px;
      letter-spacing: 1px;
    }

    h1, h2, h3 {
      color: var(--gold);
    }

    .login-container {
      max-width: 420px;
      margin: 60px auto;
    }

    .app-shell {
      max-width: 1180px;
      margin: 0 auto;
      display: none;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }

    .school-title {
      color: var(--gold);
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 0.8px;
    }

    .user-badge {
      color: var(--blue);
      font-family: monospace;
      font-size: 13px;
      text-align: right;
    }

    .nav-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    button {
      cursor: pointer;
    }

    .tab-btn {
      padding: 10px 15px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      cursor: pointer;
      font-weight: 700;
    }

    .tab-btn.active {
      background: var(--gold);
      color: var(--navy);
    }

    .tab-btn.danger {
      margin-left: auto;
      color: var(--red);
      background: transparent;
      border-color: rgba(252, 129, 129, 0.35);
    }

    .view-section {
      display: none;
    }

    .view-section.active {
      display: block;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .grid-4 {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 14px;
    }

    .control-group label {
      font-size: 11px;
      color: var(--blue);
      text-transform: uppercase;
      font-weight: 800;
      letter-spacing: 0.5px;
    }

    .control-group input,
    .control-group select {
      padding: 12px;
      background: var(--mid);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: white;
      outline: none;
      font-family: monospace;
      width: 100%;
    }

    .btn-primary {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--gold), #e6b800);
      color: var(--navy);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 800;
      text-transform: uppercase;
      margin-top: 10px;
    }

    .btn-primary:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .btn-small {
      background: var(--blue);
      color: var(--navy);
      border: none;
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 800;
      font-size: 12px;
    }

    .btn-green {
      background: var(--green);
      color: #fff;
    }

    .btn-red {
      background: var(--red);
      color: #fff;
    }

    .input-error {
      border: 2px solid var(--red) !important;
      background: rgba(252, 129, 129, 0.15) !important;
    }

    #customAlertBox {
      display: none;
      position: fixed;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      min-width: 310px;
      max-width: 92vw;
      padding: 14px 18px;
      border-radius: 10px;
      font-weight: 800;
      text-align: center;
      box-shadow: 0 14px 30px rgba(0,0,0,0.5);
    }

    .alert-error {
      background: rgba(252, 129, 129, 0.96);
      border: 1px solid var(--red);
      color: white;
    }

    .alert-success {
      background: rgba(72, 187, 120, 0.96);
      border: 1px solid var(--green);
      color: white;
    }

    .alert-info {
      background: rgba(99, 179, 237, 0.96);
      border: 1px solid var(--blue);
      color: var(--navy);
    }

    #studentContainer {
      max-height: 440px;
      overflow-y: auto;
      background: var(--card);
      border: 1px solid var(--border);
      padding: 6px;
      border-radius: 10px;
      margin-top: 12px;
    }

    .student-row {
      display: grid;
      grid-template-columns: 110px 1fr 130px;
      gap: 10px;
      align-items: center;
      padding: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .student-row span {
      color: #dbeafe;
      font-size: 14px;
    }

    .student-row input {
      padding: 8px;
      background: var(--dark);
      border: 1px solid var(--border);
      color: white;
      text-align: center;
      border-radius: 6px;
      text-transform: uppercase;
      font-family: monospace;
    }

    .hint {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
      margin: 8px 0 12px;
    }

    .analytics-panel {
      display: none;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
      margin: 15px 0;
    }

    .stat-box {
      background: var(--mid);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
    }

    .stat-box h4 {
      color: var(--gold);
      font-size: 12px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .stat-box div,
    .stat-box p {
      font-family: monospace;
      font-size: 14px;
      line-height: 1.5;
    }

    .text-green { color: var(--green); font-weight: 900; }
    .text-red { color: var(--red); font-weight: 900; }

    .table-wrap {
      overflow-x: auto;
      border-radius: 10px;
      border: 1px solid var(--border);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--card);
      font-family: monospace;
    }

    th, td {
      padding: 10px;
      border: 1px solid var(--border);
      text-align: center;
      font-size: 13px;
      white-space: nowrap;
    }

    th {
      background: var(--mid);
      color: var(--gold);
      text-transform: uppercase;
    }

    .highlight-col {
      background: rgba(246, 201, 14, 0.07);
      color: var(--gold);
      font-weight: bold;
    }

    .perc-col {
      background: rgba(99, 179, 237, 0.09);
      color: var(--blue);
      font-weight: bold;
    }

    .fail-row {
      background: rgba(252, 129, 129, 0.13) !important;
    }

    @media(max-width: 850px) {
      .grid-3, .grid-4 {
        grid-template-columns: 1fr;
      }

      .student-row {
        grid-template-columns: 90px 1fr 110px;
      }

      .tab-btn.danger {
        margin-left: 0;
      }

      .card {
        padding: 16px;
      }
    }

    @media print {
      body {
        background: #fff !important;
        color: #000 !important;
      }

      .no-print, #loginPage, .nav-tabs, #customAlertBox {
        display: none !important;
      }

      .app-shell, .view-section.active, .card {
        display: block !important;
        box-shadow: none !important;
        background: #fff !important;
        color: #000 !important;
        border: none !important;
      }

      table, th, td {
        border: 1px solid #000 !important;
        color: #000 !important;
      }

      th {
        background: #eee !important;
      }
    }
  </style>
</head>

<body>

  <div id="customAlertBox"></div>

  <div id="loginPage" class="login-container">
    <div class="card">
      <div class="school-logo">BGPS</div>
      <h1 style="text-align:center; font-size:26px; margin-bottom:20px;">BG PUBLIC SCHOOL</h1>

      <div class="control-group">
        <label>Teacher ID</label>
        <input type="text" id="tid" placeholder="Teacher ID" autocomplete="username" />
      </div>

      <div class="control-group">
        <label>Security PIN</label>
        <input type="password" id="tpass" placeholder="PIN" autocomplete="current-password" />
      </div>

      <button class="btn-primary" onclick="loginTeacher()">Login</button>

      <p class="hint" style="text-align:center;">
        Authorized BG Public School staff login only.
      </p>
    </div>
  </div>

  <div id="appShell" class="app-shell">
    <div class="topbar no-print">
      <div class="school-title">BG PUBLIC SCHOOL ERP</div>
      <div id="loggedInUser" class="user-badge">User</div>
    </div>

    <div class="nav-tabs no-print">
      <button class="tab-btn active" id="tab-entry" onclick="switchTab('entry')">Marks Entry</button>
      <button class="tab-btn" id="tab-dash" onclick="switchTab('dash')">Dashboard</button>
      <button class="tab-btn" onclick="exportToCSV()">Download CSV</button>
      <button class="tab-btn" onclick="window.print()">Print</button>
      <button class="tab-btn danger" onclick="logout()">Logout</button>
    </div>

    <div class="card view-section active" id="entryView">
      <h2>Marks Entry</h2>
      <p class="hint">
        Rule: हर visible roll में marks या <b>AB</b> भरना compulsory है. Blank roll submit नहीं होगा.
      </p>

      <div class="grid-4 no-print">
        <div class="control-group">
          <label>Class</label>
          <select id="classIn"></select>
        </div>

        <div class="control-group">
          <label>Subject</label>
          <select id="subIn">
            <option value="">Select Subject</option>
            <option>English Language</option>
            <option>English Literature</option>
            <option>Hindi</option>
            <option>Maths</option>
            <option>Geography</option>
            <option>History/Civics</option>
            <option>Chemistry</option>
            <option>Biology</option>
            <option>Physics</option>
            <option>GK/Msc</option>
            <option>Computer</option>
          </select>
        </div>

        <div class="control-group">
          <label>Exam</label>
          <select id="examType">
            <option>Unit Test 1</option>
            <option>Unit Test 2</option>
            <option>Half Yearly</option>
            <option>Unit Test 3</option>
            <option>Annual Exam</option>
          </select>
        </div>

        <div class="control-group">
          <label>Mode</label>
          <select id="typeIn">
            <option>Written</option>
            <option>Oral</option>
            <option>Practical</option>
          </select>
        </div>
      </div>

      <div class="grid-3 no-print">
        <div class="control-group">
          <label>Max Marks</label>
          <input type="number" id="maxMarks" min="1" placeholder="e.g. 80" />
        </div>

        <div class="control-group">
          <label>Total Students / Rolls</label>
          <input type="number" id="stuCount" value="50" min="1" max="250" />
        </div>

        <div class="control-group">
          <label>Generate Roll Format</label>
          <button class="btn-small btn-green" onclick="generateRows()" style="height:42px; margin-top:18px;">Set Roll Nos</button>
        </div>
      </div>

      <div id="studentContainer"></div>

      <button class="btn-primary no-print" id="submitBtn" onclick="submitData()">Submit / Update Records</button>
    </div>

    <div class="card view-section" id="dashView">
      <h2>Dashboard</h2>

      <div class="grid-3 no-print">
        <div class="control-group">
          <label>Select Class & Exam</label>
          <select id="tabSelector"></select>
        </div>

        <div class="control-group">
          <label>Fetch</label>
          <button class="btn-small btn-green" id="fetchBtn" onclick="fetchData()" style="height:42px; margin-top:18px;">Fetch Data</button>
        </div>

        <div class="control-group">
          <label>Status</label>
          <input type="text" id="dashStatus" readonly value="Waiting..." />
        </div>
      </div>

      <div id="analyticsPanel" class="analytics-panel">
        <div class="stat-box">
          <h4>Overall Result</h4>
          <p id="passFailText">Waiting...</p>
        </div>

        <div class="stat-box">
          <h4>Top 3 Rankers</h4>
          <div id="topRankersList">Waiting...</div>
        </div>

        <div class="stat-box">
          <h4>Subject Average</h4>
          <div id="subjectAvgsList">Waiting...</div>
        </div>
      </div>

      <div class="table-wrap">
        <table id="resTable">
          <thead id="tHead"></thead>
          <tbody id="tBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbx_csBKyvviScR_x5tPRBRmcXMNuz9tpqyrECWYqJxrqKB-jkl7BNw3D9CG23IWPMeb/exec";

    const customSubjectOrder = [
      "ENGLISH LANGUAGE",
      "ENGLISH LITERATURE",
      "HINDI",
      "MATHS",
      "GEOGRAPHY",
      "HISTORY/CIVICS",
      "CHEMISTRY",
      "BIOLOGY",
      "PHYSICS",
      "GK/MSC",
      "COMPUTER"
    ];

    const classList = [
      "Playgroup",
      "LKG",
      "UKG",
      "Class 1",
      "Class 2",
      "Class 3",
      "Class 4",
      "Class 5",
      "Class 6",
      "Class 7",
      "Class 8",
      "Class 9",
      "Class 10",
      "Class 11",
      "Class 12"
    ];

    const teacherClassMap = {
      "T-1": "Playgroup",
      "T-2": "LKG",
      "T-3": "UKG",
      "T-4": "Class 1",
      "T-5": "Class 2",
      "T-6": "Class 3",
      "T-7": "Class 4",
      "T-8": "Class 5",
      "T-9": "Class 6",
      "T-10": "Class 7",
      "T-11": "Class 8",
      "T-12": "Class 9",
      "T-13": "Class 10",
      "T-14": "Class 11",
      "T-15": "Class 12",
      "ADMIN": "ALL_CLASSES"
    };

    let currentId = "";
    let currentClassView = "";
    let currentExamView = "";
    let globalStudents = {};
    let globalSubsArray = [];
    let globalRankMap = {};
    let alertTimer = null;

    window.addEventListener("DOMContentLoaded", function() {
      generateRows();
    });

    function showMessage(msg, type = "info") {
      const box = document.getElementById("customAlertBox");
      box.innerHTML = msg;
      box.className = type === "error" ? "alert-error" : (type === "success" ? "alert-success" : "alert-info");
      box.style.display = "block";

      clearTimeout(alertTimer);
      alertTimer = setTimeout(function() {
        box.style.display = "none";
      }, 4200);
    }

    function loginTeacher() {
      const id = document.getElementById("tid").value.trim().toUpperCase();
      const pass = document.getElementById("tpass").value.trim();

      if (!id || !pass) {
        showMessage("Teacher ID aur PIN required hain.", "error");
        return;
      }

      const valid =
        (id === "ADMIN" && pass === "Admin@1") ||
        (id !== "ADMIN" && pass === "bgps123" && teacherClassMap[id]);

      if (!valid) {
        showMessage("Login failed. ID ya PIN galat hai.", "error");
        return;
      }

      currentId = id;
      const assignedClass = teacherClassMap[id];

      document.getElementById("loggedInUser").textContent =
        id + " | " + (assignedClass === "ALL_CLASSES" ? "SUPER ADMIN" : assignedClass);

      populateClassOptions(id);
      populateDashboardOptions(id);

      document.getElementById("loginPage").style.display = "none";
      document.getElementById("appShell").style.display = "block";

      switchTab("entry");
      showMessage("Login successful. Welcome to BG Public School ERP.", "success");
    }

    function logout() {
      currentId = "";
      location.reload();
    }

    function populateClassOptions(id) {
      const classSelect = document.getElementById("classIn");
      classSelect.innerHTML = "";

      const allowedClasses = id === "ADMIN" ? classList : [teacherClassMap[id]];

      allowedClasses.forEach(function(cls) {
        const opt = document.createElement("option");
        opt.value = cls;
        opt.textContent = cls;
        classSelect.appendChild(opt);
      });
    }

    function populateDashboardOptions(id) {
      const selector = document.getElementById("tabSelector");
      selector.innerHTML = '<option value="">Select Report</option>';

      const allowedClasses = id === "ADMIN" ? classList : [teacherClassMap[id]];
      const exams = ["Unit Test 1", "Unit Test 2", "Half Yearly", "Unit Test 3", "Annual Exam"];

      allowedClasses.forEach(function(cls) {
        exams.forEach(function(exam) {
          const opt = document.createElement("option");
          opt.value = cls + "|" + exam;
          opt.textContent = cls + " - " + exam;
          selector.appendChild(opt);
        });
      });
    }

    function switchTab(tab) {
      document.querySelectorAll(".view-section").forEach(function(el) {
        el.classList.remove("active");
      });

      document.querySelectorAll(".tab-btn").forEach(function(el) {
        el.classList.remove("active");
      });

      if (tab === "entry") {
        document.getElementById("entryView").classList.add("active");
        document.getElementById("tab-entry").classList.add("active");
      } else {
        document.getElementById("dashView").classList.add("active");
        document.getElementById("tab-dash").classList.add("active");
      }
    }

    function generateRows() {
      const countEl = document.getElementById("stuCount");
      const count = Number(countEl ? countEl.value : 50);
      const container = document.getElementById("studentContainer");

      if (!count || count < 1 || count > 250) {
        showMessage("Roll count 1 se 250 ke beech hona chahiye.", "error");
        return;
      }

      container.innerHTML = "";

      for (let i = 1; i <= count; i++) {
        const row = document.createElement("div");
        row.className = "student-row";
        row.innerHTML = `
          <strong>Roll ${String(i).padStart(2, "0")}</strong>
          <span>Enter marks or AB</span>
          <input type="text" class="m-input" data-roll="${i}" placeholder="Marks / AB" />
        `;
        container.appendChild(row);
      }

      showMessage("Roll format generated for " + count + " students.", "info");
    }

    document.addEventListener("input", function(e) {
      if (!e.target.classList.contains("m-input")) return;

      const input = e.target;
      const maxEl = document.getElementById("maxMarks");
      const maxVal = Number(maxEl.value);
      let val = input.value.trim().toUpperCase();

      input.classList.remove("input-error");
      maxEl.classList.remove("input-error");

      if (val === "" || val === "A" || val === "AB") return;

      if (!maxVal || maxVal <= 0) {
        maxEl.classList.add("input-error");
        input.value = "";
        showMessage("Pehle Max Marks fill karo.", "error");
        maxEl.focus();
        return;
      }

      if (isNaN(Number(val))) {
        input.value = "";
        showMessage("Marks number ya AB hona chahiye.", "error");
        return;
      }

      const num = Number(val);

      if (num < 0 || num > maxVal) {
        input.classList.add("input-error");
        input.value = "";
        showMessage("Marks 0 se " + maxVal + " ke beech hone chahiye.", "error");
      }
    });

    async function submitData() {
      const clsEl = document.getElementById("classIn");
      const subEl = document.getElementById("subIn");
      const examEl = document.getElementById("examType");
      const typeEl = document.getElementById("typeIn");
      const maxEl = document.getElementById("maxMarks");

      [clsEl, subEl, examEl, typeEl, maxEl].forEach(function(el) {
        el.classList.remove("input-error");
      });

      const cls = clsEl.value;
      const subject = subEl.value;
      const examType = examEl.value;
      const type = typeEl.value;
      const maxMarks = Number(maxEl.value);

      let formError = false;

      if (!cls) { clsEl.classList.add("input-error"); formError = true; }
      if (!subject) { subEl.classList.add("input-error"); formError = true; }
      if (!examType) { examEl.classList.add("input-error"); formError = true; }
      if (!type) { typeEl.classList.add("input-error"); formError = true; }
      if (!maxMarks || maxMarks <= 0) { maxEl.classList.add("input-error"); formError = true; }

      if (formError) {
        showMessage("Class, Subject, Exam, Mode aur Max Marks check karo.", "error");
        return;
      }

      const entries = [];
      const blankRolls = [];
      const invalidRolls = [];

      document.querySelectorAll(".m-input").forEach(function(input) {
        input.classList.remove("input-error");

        let val = input.value.trim().toUpperCase();
        const roll = input.dataset.roll;

        if (val === "") {
          input.classList.add("input-error");
          blankRolls.push(roll);
          return;
        }

        if (val === "A") val = "AB";

        if (val !== "AB") {
          const num = Number(val);

          if (isNaN(num) || num < 0 || num > maxMarks) {
            input.classList.add("input-error");
            invalidRolls.push(roll);
            return;
          }

          val = num;
        }

        entries.push({
          teacherId: currentId || "UNKNOWN",
          className: cls,
          subject: subject,
          examType: examType,
          type: type,
          rollNo: roll,
          marks: val,
          maxMarks: maxMarks
        });
      });

      if (blankRolls.length > 0) {
        showMessage("Blank rolls: " + blankRolls.slice(0, 20).join(", ") + ". Marks ya AB enter karo.", "error");
        return;
      }

      if (invalidRolls.length > 0) {
        showMessage("Invalid marks in rolls: " + invalidRolls.join(", "), "error");
        return;
      }

      const btn = document.getElementById("submitBtn");
      btn.disabled = true;
      btn.textContent = "Saving...";

      try {
        await fetch(WEB_APP_URL, {
          method: "POST",
          mode: "no-cors",
          headers: {
            "Content-Type": "text/plain;charset=utf-8"
          },
          body: JSON.stringify({ entries: entries })
        });

        btn.textContent = "Verifying...";
        await sleep(2000);

        const verified = await verifySavedEntries(entries);

        if (verified.ok) {
          showMessage("✅ Records saved and verified!", "success");

          document.querySelectorAll(".m-input").forEach(function(input) {
            input.value = "";
            input.classList.remove("input-error");
          });

        } else {
          showMessage(
            "⚠️ Verification failed. Missing rolls: " + verified.missing.slice(0, 15).join(", "),
            "error"
          );
        }

      } catch (err) {
        showMessage("Network/verification error: " + err.message, "error");

      } finally {
        btn.disabled = false;
        btn.textContent = "Submit / Update Records";
      }
    }

    async function verifySavedEntries(entries) {
      const raw = await getMasterData();
      const dataRows = raw.slice(1);

      const existingKeys = new Set();

      dataRows.forEach(function(row) {
        const key = makeKey(row[2], row[3], row[4], row[5], row[6], row[7], row[8]);
        existingKeys.add(key);
      });

      const missing = [];

      entries.forEach(function(item) {
        const key = makeKey(
          item.className,
          item.subject,
          item.examType,
          item.type,
          item.rollNo,
          item.marks,
          item.maxMarks
        );

        if (!existingKeys.has(key)) {
          missing.push(item.rollNo);
        }
      });

      return {
        ok: missing.length === 0,
        missing: missing,
        checked: entries.length
      };
    }

    async function getMasterData() {
      const res = await fetch(WEB_APP_URL + "?action=get&ts=" + Date.now(), {
        method: "GET",
        cache: "no-store"
      });

      const payload = await res.json();

      if (Array.isArray(payload)) return payload;

      if (payload.status === "success" && Array.isArray(payload.data)) {
        return payload.data;
      }

      throw new Error(payload.msg || "Invalid backend response.");
    }

    async function fetchData() {
      const selector = document.getElementById("tabSelector");
      selector.classList.remove("input-error");

      if (!selector.value) {
        selector.classList.add("input-error");
        showMessage("Class aur Exam select karo.", "error");
        return;
      }

      const parts = selector.value.split("|");
      const selectedClass = parts[0];
      const selectedExam = parts[1];

      currentClassView = selectedClass;
      currentExamView = selectedExam;

      const btn = document.getElementById("fetchBtn");
      btn.disabled = true;
      btn.textContent = "Fetching...";

      try {
        const rawData = await getMasterData();

        if (!rawData || rawData.length < 2) {
          showMessage("No data found in Master sheet.", "info");
          clearDashboard();
          return;
        }

        const cIdx = 2, sIdx = 3, eIdx = 4, tIdx = 5, rIdx = 6, oIdx = 7, mIdx = 8;

        const students = {};
        const allSubjects = new Set();
        let hasData = false;

        for (let i = 1; i < rawData.length; i++) {
          const row = rawData[i];

          if (!row) continue;

          const cls = String(row[cIdx] || "").trim();
          const exam = String(row[eIdx] || "").trim();

          if (cls !== selectedClass || exam !== selectedExam) continue;

          hasData = true;

          const roll = String(row[rIdx] || "").trim();
          if (!roll) continue;

          const subject = String(row[sIdx] || "UNKNOWN").trim().toUpperCase();
          const mode = String(row[tIdx] || "Written").trim().toLowerCase();
          const max = Number(row[mIdx]) || 0;
          const marksText = String(row[oIdx]).trim().toUpperCase();
          const obtained = marksText === "AB" ? "AB" : (Number(marksText) || 0);

          if (!students[roll]) students[roll] = { subs: {}, totalMax: 0, totalObt: 0 };

          if (!students[roll].subs[subject]) {
            students[roll].subs[subject] = {
              written: { o: "-", m: 0 },
              oral: { o: "-", m: 0 },
              practical: { o: "-", m: 0 },
              totMax: 0,
              totObt: 0,
              hasAB: false
            };
          }

          if (students[roll].subs[subject][mode] !== undefined) {
            students[roll].subs[subject][mode] = { o: obtained, m: max };
          }

          allSubjects.add(subject);
        }

        if (!hasData) {
          showMessage(selectedClass + " - " + selectedExam + " ka data nahi mila.", "info");
          clearDashboard();
          return;
        }

        const rolls = Object.keys(students);

        rolls.forEach(function(roll) {
          const student = students[roll];

          Object.keys(student.subs).forEach(function(subject) {
            const sub = student.subs[subject];

            ["written", "oral", "practical"].forEach(function(mode) {
              const obj = sub[mode];

              if (obj.m > 0) {
                sub.totMax += Number(obj.m);
                student.totalMax += Number(obj.m);
              }

              if (obj.o === "AB") {
                sub.hasAB = true;
              } else if (obj.o !== "-") {
                sub.totObt += Number(obj.o);
                student.totalObt += Number(obj.o);
              }
            });
          });
        });

        const subsArray = Array.from(allSubjects).sort(function(a, b) {
          let posA = customSubjectOrder.indexOf(a);
          let posB = customSubjectOrder.indexOf(b);

          if (posA === -1) posA = 999;
          if (posB === -1) posB = 999;

          if (posA !== posB) return posA - posB;
          return a.localeCompare(b);
        });

        const rankRolls = rolls.slice().sort(function(a, b) {
          return students[b].totalObt - students[a].totalObt;
        });

        const rankMap = {};
        let currentRank = 1;

        rankRolls.forEach(function(roll, index) {
          if (index > 0 && students[roll].totalObt < students[rankRolls[index - 1]].totalObt) {
            currentRank = index + 1;
          }

          rankMap[roll] = currentRank;
        });

        globalStudents = students;
        globalSubsArray = subsArray;
        globalRankMap = rankMap;

        renderAnalytics(students, subsArray, rankMap);
        renderTable(students, subsArray, rankMap);

        document.getElementById("dashStatus").value = "Loaded: " + selectedClass + " | " + selectedExam;
        showMessage("Data fetched successfully.", "success");

      } catch (err) {
        showMessage("Fetch error: " + err.message, "error");
        clearDashboard();

      } finally {
        btn.disabled = false;
        btn.textContent = "Fetch Data";
      }
    }

    function renderAnalytics(students, subsArray, rankMap) {
      const rolls = Object.keys(students);
      let passCount = 0;
      let failCount = 0;

      const subjectStats = {};
      subsArray.forEach(function(sub) {
        subjectStats[sub] = { obt: 0, max: 0, count: 0 };
      });

      rolls.forEach(function(roll) {
        const s = students[roll];
        const percent = s.totalMax > 0 ? (s.totalObt / s.totalMax) * 100 : 0;

        if (percent >= 33) passCount++;
        else failCount++;

        subsArray.forEach(function(sub) {
          if (s.subs[sub] && s.subs[sub].totMax > 0) {
            subjectStats[sub].obt += s.subs[sub].totObt;
            subjectStats[sub].max += s.subs[sub].totMax;
            subjectStats[sub].count++;
          }
        });
      });

      document.getElementById("analyticsPanel").style.display = "grid";
      document.getElementById("passFailText").innerHTML =
        '<span class="text-green">PASS: ' + passCount + '</span><br>' +
        '<span class="text-red">FAIL/NI: ' + failCount + '</span>';

      const topRolls = rolls.slice().sort(function(a, b) {
        return rankMap[a] - rankMap[b];
      }).slice(0, 3);

      let topHtml = "";

      topRolls.forEach(function(roll) {
        const s = students[roll];
        const p = s.totalMax > 0 ? ((s.totalObt / s.totalMax) * 100).toFixed(1) : "0.0";
        topHtml += "<div>Rank " + rankMap[roll] + ": Roll " + roll + " (" + p + "%)</div>";
      });

      document.getElementById("topRankersList").innerHTML = topHtml || "N/A";

      let avgHtml = "";

      subsArray.forEach(function(sub) {
        const st = subjectStats[sub];
        const avg = st.max > 0 ? ((st.obt / st.max) * 100).toFixed(1) : "0.0";
        avgHtml += "<div>" + sub + ": " + avg + "%</div>";
      });

      document.getElementById("subjectAvgsList").innerHTML = avgHtml || "N/A";
    }

    function renderTable(students, subsArray, rankMap) {
      let header = "<tr><th>Roll No</th>";

      subsArray.forEach(function(sub) {
        header += "<th>" + escapeHtml(sub) + "</th>";
      });

      header += "<th class='highlight-col'>Max</th><th class='highlight-col'>Obt</th><th class='perc-col'>%</th><th>Rank</th></tr>";

      document.getElementById("tHead").innerHTML = header;

      const displayRolls = Object.keys(students).sort(function(a, b) {
        return Number(a) - Number(b);
      });

      let body = "";

      displayRolls.forEach(function(roll) {
        const s = students[roll];
        const percentRaw = s.totalMax > 0 ? (s.totalObt / s.totalMax) * 100 : 0;
        const fail = percentRaw < 33;

        body += "<tr class='" + (fail ? "fail-row" : "") + "'>";
        body += "<td>" + escapeHtml(roll) + "</td>";

        subsArray.forEach(function(sub) {
          const d = s.subs[sub];

          if (!d) {
            body += "<td>-</td>";
          } else {
            const val = d.totMax > 0
              ? (d.hasAB && d.totObt === 0 ? "AB" : d.totObt)
              : "-";

            body += "<td>" + val + "</td>";
          }
        });

        body += "<td class='highlight-col'>" + s.totalMax + "</td>";
        body += "<td class='highlight-col'>" + s.totalObt + "</td>";
        body += "<td class='perc-col'>" + percentRaw.toFixed(2) + "%</td>";
        body += "<td># " + rankMap[roll] + "</td>";
        body += "</tr>";
      });

      document.getElementById("tBody").innerHTML = body;
    }

    function clearDashboard() {
      document.getElementById("tHead").innerHTML = "";
      document.getElementById("tBody").innerHTML = "";
      document.getElementById("analyticsPanel").style.display = "none";
      document.getElementById("dashStatus").value = "No data";
    }

    function exportToCSV() {
      const table = document.getElementById("resTable");

      if (!document.getElementById("tHead").innerHTML) {
        showMessage("Pehle dashboard data fetch karo.", "error");
        return;
      }

      const rows = table.querySelectorAll("tr");
      const csv = [];

      rows.forEach(function(row) {
        const cols = row.querySelectorAll("th, td");
        const line = [];

        cols.forEach(function(col) {
          line.push('"' + col.innerText.replace(/"/g, '""') + '"');
        });

        csv.push(line.join(","));
      });

      const blob = new Blob([csv.join("\n")], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");

      a.href = url;
      a.download = (currentClassView || "Class") + "_" + (currentExamView || "Exam") + "_Report.csv";
      a.click();

      URL.revokeObjectURL(url);
      showMessage("CSV downloaded.", "success");
    }

    function makeKey(className, subject, examType, type, rollNo, marks, maxMarks) {
      return [
        norm(className),
        norm(subject),
        norm(examType),
        norm(type),
        norm(rollNo),
        norm(marks),
        norm(maxMarks)
      ].join("|");
    }

    function norm(value) {
      if (value === null || value === undefined) return "";
      return String(value).trim().toUpperCase();
    }

    function sleep(ms) {
      return new Promise(function(resolve) {
        setTimeout(resolve, ms);
      });
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
