<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BG PUBLIC SCHOOL | Admin ERP</title>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;600;700&family=Inconsolata:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --navy: #0a1628; --dark: #0e1f3d; --mid: #162d52; --card: #1a3460; --border: rgba(99,179,237,0.18); --gold: #f6c90e; --blue: #63b3ed; --white: #f7fafc; --red: #fc8181; --green: #48bb78;}
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Georgia', serif; background: radial-gradient(ellipse at 30% 20%, #0d2137 0%, var(--navy) 60%); color: var(--white); min-height: 100vh; padding: 20px; }
        .card { background: var(--dark); padding: 30px; border: 1px solid rgba(246,201,14,.25); border-radius: 16px; box-shadow: 0 32px 80px rgba(0,0,0,.7); margin-bottom: 20px; }
        .school-logo { width: 100px; height: 100px; margin: 0 auto 20px; border-radius: 50%; background: var(--mid); border: 3px solid var(--gold); overflow: hidden; display: flex; align-items: center; justify-content: center; position: relative; }
        .logo-text { font-family: 'EB Garamond', serif; font-size: 22px; color: var(--gold); font-weight: bold; }
        .btn-primary { width: 100%; padding: 14px; background: linear-gradient(135deg, var(--gold), #e6b800); color: var(--navy); border: none; border-radius: 8px; cursor: pointer; font-weight: 700; text-transform: uppercase; margin-top: 10px; transition: 0.2s;}
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(246,201,14,0.4); }
        .btn-small { background: var(--blue); color: var(--navy); border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 11px; text-transform: uppercase; }
        .app-shell { max-width: 1100px; margin: 0 auto; display: none; }
        .nav-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { padding: 10px 15px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 8px; color: #718096; cursor: pointer; }
        .tab-btn.active { background: var(--gold); color: var(--navy); font-weight: 700; }
        .view-section { display: none; }
        .view-section.active { display: block; }
        .control-group { display: flex; flex-direction: column; gap: 4px; margin-bottom: 15px; }
        .control-group label { font-size: 10px; color: var(--blue); text-transform: uppercase; font-weight: 700; }
        .control-group input, .control-group select { padding: 12px; background: var(--mid); border: 1px solid var(--border); border-radius: 6px; color: white; outline: none; font-family: 'Inconsolata', monospace; }
        #studentContainer { max-height: 400px; overflow-y: auto; background: var(--card); border: 1px solid var(--border); padding: 5px; border-radius: 6px; }
        .student-row { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.02); }
        .student-row input { width: 80px; padding: 6px; background: var(--dark); border: 1px solid var(--border); color: white; text-align: center; border-radius: 4px; }
        .fail-row { background: rgba(252, 129, 129, 0.15) !important; border-left: 3px solid var(--red) !important; }
        table { width: 100%; border-collapse: collapse; font-family: 'Inconsolata', monospace; margin-top: 10px; background: var(--card); border-radius: 8px; overflow: hidden; }
        th, td { padding: 10px; border: 1px solid var(--border); text-align: center; font-size: 13px; }
        th { background: var(--mid); color: var(--gold); text-transform: uppercase; }
        #individualReportContainer { display: none; margin-top: 30px; }
        #individualReport { background: #ffffff; color: #000000; padding: 30px; border: 3px solid var(--navy); border-radius: 12px; font-family: 'Georgia', serif; position: relative; box-shadow: 0 15px 40px rgba(0,0,0,0.5); }
        .ir-header { text-align: center; border-bottom: 3px solid var(--navy); padding-bottom: 15px; margin-bottom: 25px; }
        .ir-header h1 { font-family: 'EB Garamond', serif; font-size: 34px; margin: 0; color: var(--navy); font-weight: bold; text-transform: uppercase; }
        .ir-header h3 { font-size: 18px; margin: 8px 0 0 0; color: #b7791f; text-transform: uppercase; font-family: 'Segoe UI', sans-serif;}
        .ir-details { display: flex; justify-content: space-between; font-size: 16px; margin-bottom: 25px; font-weight: bold; background: #f0f4f8; padding: 15px 20px; border-radius: 8px; color: var(--navy); }
        .ir-table { width: 100%; border-collapse: collapse; margin-bottom: 30px; background: #ffffff !important; border-radius: 8px; overflow: hidden;}
        .ir-table th, .ir-table td { border: 1px solid #cbd5e1 !important; padding: 14px; text-align: center; }
        .ir-table th { background: var(--navy) !important; color: var(--gold) !important; }
        .ir-table td { color: #1e293b !important; font-weight: 600; }
        .ir-summary { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .ir-box { border: 2px solid #cbd5e1; padding: 18px; text-align: center; font-weight: bold; background: #ffffff; color: var(--navy); font-size: 16px; border-radius: 8px; }
        .ir-footer { display: flex; justify-content: space-between; margin-top: 50px; font-size: 16px; font-weight: bold; color: var(--navy); }
        .sign-line { border-top: 2px solid var(--navy); width: 200px; text-align: center; padding-top: 8px; }
        
        @media print {
            body { background: white !important; color: black !important; padding: 0; }
            .no-print, .login-container, .nav-tabs, #loggedInUser, .btn-primary, .app-shell > div:not(.view-section.active) { display: none !important; }
            body.print-cons #dashMain { display: block !important; }
            body.print-cons #individualReportContainer { display: none !important; }
            body.print-indv #dashMain { display: none !important; }
            body.print-indv #individualReportContainer { display: block !important; padding: 0 !important; margin: 0 !important; }
            body.print-cons table { width: 100% !important; border: 2px solid #000 !important; background: white !important; table-layout: fixed !important; }
            body.print-cons th, body.print-cons td { border: 1px solid #000 !important; color: black !important; padding: 4px 2px !important; text-align: center; word-wrap: break-word !important; } 
            body.print-cons th { background: #f2f2f2 !important; font-weight: bold; font-size: 10px !important; }
            body.print-cons td { font-size: 11px !important; }
            body.print-cons .fail-row { background: #ffe6e6 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        }
    </style>
</head>
<body>
    <!-- [Rest of the HTML/Script remains identical to previous version, just ensuring rank and sequence] -->
    <div class="login-container" id="loginPage" style="max-width:400px; margin: 60px auto;">
        <div class="card">
            <div class="school-logo"><span class="logo-text">BGPS</span></div>
            <h1 style="text-align:center; color:var(--gold); font-family:'EB Garamond'; font-size:24px; margin-bottom:20px;">BG PUBLIC SCHOOL</h1>
            <div class="control-group"><label>Teacher ID</label><input type="text" id="tid" placeholder="ADMIN, T-4, etc."></div>
            <div class="control-group"><label>Security PIN</label><input type="password" id="tpass" placeholder="bgps123"></div>
            <button class="btn-primary" onclick="loginTeacher()">Login</button>
        </div>
    </div>
    <div class="app-shell" id="appShell">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;" class="no-print">
            <div style="font-family:'EB Garamond'; color:var(--gold); font-size:22px; font-weight:bold;">BG PUBLIC SCHOOL</div>
            <div id="loggedInUser" style="color:var(--blue); font-size:12px;">User</div>
        </div>
        <div class="nav-tabs no-print">
            <button class="tab-btn" id="tab-entry" onclick="switchTab('entry')">Marks Entry</button>
            <button class="tab-btn" id="tab-dash" onclick="switchTab('dash')">Dashboard</button>
            <button class="tab-btn" onclick="location.reload()" style="margin-left:auto; color:var(--red); border:none; background:transparent;">Logout</button>
        </div>
        <div class="card view-section" id="entryView">
            <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px;">
                <div class="control-group"><label>Class</label><select id="class"></select></div>
                <div class="control-group"><label>Subject</label>
                    <select id="subject">
                        <option value="">Select</option>
                        <option>English Literature</option>
                        <option>English Language</option>
                        <option>Hindi</option>
                        <option>Maths</option>
                        <option>Geography</option>
                        <option>History/Civics</option>
                        <option>Chemistry</option>
                        <option>Biology</option>
                        <option>Physics</option>
                        <option>GK/Msc</option>
                        <option>Computer</option>
                    </select>
                </div>
                <div class="control-group"><label>Exam</label><select id="examType"><option>Unit Test 1</option><option>Unit Test 2</option><option>Half Yearly</option><option>Unit Test 3</option><option>Annual Exam</option></select></div>
            </div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <div class="control-group"><label>Mode</label><select id="type"><option>Written</option><option>Oral</option><option>Practical</option></select></div>
                <div class="control-group"><label>Max Marks</label><input type="number" id="maxMarks" placeholder="e.g. 80"></div>
            </div>
            <div id="studentContainer"></div>
            <button class="btn-primary" onclick="submitData()" id="submitBtn">Submit Records</button>
        </div>
        <div class="card view-section" id="dashView">
            <div id="dashMain">
                <div style="display:flex; gap:10px; margin-bottom:15px; align-items:flex-end;" class="no-print">
                    <div class="control-group" style="flex:2; margin-bottom:0;"><label>Select Class & Exam</label><select id="tabSelector"></select></div>
                    <button class="btn-primary" onclick="fetchData()" style="flex:1; margin:0; padding:10px;" id="fetchBtn">Fetch Data</button>
                    <button class="btn-primary" id="btn-print-cons" onclick="printConsolidated()" style="flex:1; margin:0; padding:10px; background:var(--green); display:none;">Print Consolidated</button>
                </div>
                <div id="printHeader" class="print-only-header"><h1>BG PUBLIC SCHOOL</h1><h3>CONSOLIDATED REPORT</h3></div>
                <table id="resTable"><thead id="tHead"></thead><tbody id="tBody"></tbody></table>
            </div>
            <div id="individualReportContainer">
                <div class="no-print" style="margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center;">
                    <h2 style="color:var(--gold); font-family:'EB Garamond';">Student Report Card</h2>
                    <div style="display:flex; gap:10px;">
                        <button class="btn-small" onclick="closeIndividualView()" style="background: var(--red); color: white; padding: 10px 15px; font-size: 14px;">⬅ Back</button>
                        <button class="btn-small" id="btn-print-indv" onclick="executeIndividualPrint()" style="background: var(--green); color: white; padding: 10px 15px; font-size: 14px; display: none;">🖨️ Print</button>
                    </div>
                </div>
                <div id="individualReport">
                    <div class="ir-header"><h1>BG PUBLIC SCHOOL</h1><h3>PROGRESS REPORT</h3></div>
                    <div class="ir-details"><span id="irRoll"></span><span id="irClass"></span><span id="irExam"></span></div>
                    <table class="ir-table"><thead><tr><th>SUBJECT</th><th>WRITTEN</th><th>ORAL</th><th>PRACTICAL</th><th>MAX</th><th>OBT</th></tr></thead><tbody id="irTableBody"></tbody></table>
                    <div class="ir-summary"><div class="ir-box" id="irTotal"></div><div class="ir-box" id="irPerc"></div><div class="ir-box" id="irRank"></div><div class="ir-box" id="irResult"></div></div>
                    <div class="ir-footer"><div class="sign-line">Class Teacher</div><div class="sign-line">Principal</div></div>
                </div>
            </div>
        </div>
    </div>
    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwoFAw_Dr-c8Uez79RLT7wbfVZ5xhqUUrFlqkcN5j4FYUsiUaaoYoC4H9tldaoxoGMZ/exec";
        const customSubjectOrder = ["ENGLISH LITERATURE", "ENGLISH LANGUAGE", "HINDI", "MATHS", "GEOGRAPHY", "HISTORY/CIVICS", "CHEMISTRY", "BIOLOGY", "PHYSICS", "GK/MSC", "COMPUTER"];
        let globalStudents = {}, globalSubsArray = [], globalRankMap = {}, currentClassView = "", currentExamView = "", currentId = "";
        
        // [Login logic, etc as before]
        function loginTeacher() {
            let id = document.getElementById('tid').value.toUpperCase(); let pass = document.getElementById('tpass').value;
            if (((id === "ADMIN" && pass === "Admin@1") || (id !== "ADMIN" && pass === "bgps123")) && mapping[id]) {
                currentId = id; let myClass = mapping[id];
                document.getElementById('loggedInUser').innerText = id + " | " + (id === "ADMIN" ? "SUPER ADMIN" : myClass);
                const clsSelect = document.getElementById('class'), dashSelect = document.getElementById('tabSelector');
                let classesToLoad = id === "ADMIN" ? ["Playgroup", "LKG", "UKG", "Class 1", "Class 2", "Class 3", "Class 4", "Class 5", "Class 6", "Class 7", "Class 8", "Class 9", "Class 10", "Class 11", "Class 12"] : [myClass];
                let clsOptions = id === "ADMIN" ? "<option value=''>Class</option>" : "", dashOptions = "<option value=''>Select Report</option>";
                const allExams = ["Unit Test 1", "Unit Test 2", "Half Yearly", "Unit Test 3", "Annual Exam"];
                classesToLoad.forEach(c => { clsOptions += `<option value="${c}">${c}</option>`; allExams.forEach(ex => { dashOptions += `<option value="${c}|${ex}">${c} - ${ex}</option>`; }); });
                clsSelect.innerHTML = clsOptions; dashSelect.innerHTML = dashOptions;
                document.getElementById('loginPage').style.display = 'none'; document.getElementById('appShell').style.display = 'block';
                if(id === "ADMIN") { document.getElementById('tab-entry').style.display = 'none'; document.getElementById('btn-print-cons').style.display = 'inline-block'; switchTab('dash'); } 
                else { document.getElementById('btn-print-cons').style.display = 'none'; generateRows(); switchTab('entry'); }
            } else { alert("Login Failed!"); }
        }

        // [Fetch & Table Generation logic - UPDATED TO INCLUDE RANK]
        async function fetchData() {
            let selection = document.getElementById('tabSelector').value; if(!selection) return alert("Select a report!");
            let [selectedClass, selectedExam] = selection.split('|'); currentClassView = selectedClass; currentExamView = selectedExam;
            let fBtn = document.getElementById('fetchBtn'); fBtn.innerText = "Fetching..."; fBtn.disabled = true;
            try {
                let res = await fetch(WEB_APP_URL + "?tabName=Master"); let rawData = await res.json();
                fBtn.innerText = "Fetch Data"; fBtn.disabled = false;
                if(!rawData || rawData.length < 2) return alert("No data found!");
                let students = {}, allSubjects = new Set();
                const cIdx=2, sIdx=3, eIdx=4, tIdx=5, rIdx=6, oIdx=7, mIdx=8;
                for(let i=1; i<rawData.length; i++) {
                    let row = rawData[i]; if(!row || String(row[cIdx]).trim() !== selectedClass || String(row[eIdx]).trim() !== selectedExam) continue;
                    let roll = String(row[rIdx] || '').trim(); if(!roll) continue;
                    let sub = String(row[sIdx] || 'UNKNOWN').toUpperCase().trim(); let mode = String(row[tIdx] || 'Written').trim().toLowerCase();
                    let max = Number(row[mIdx]) || 0, obt = Number(row[oIdx]) || 0;
                    if(!students[roll]) students[roll] = { subs: {}, totalMax: 0, totalObt: 0 };
                    if(!students[roll].subs[sub]) students[roll].subs[sub] = { max:0, obt:0, written:'-', oral:'-', practical:'-' };
                    students[roll].subs[sub].max += max; students[roll].subs[sub].obt += obt; students[roll].totalMax += max; students[roll].totalObt += obt;
                    if(mode.includes('oral')) students[roll].subs[sub].oral = students[roll].subs[sub].oral === '-' ? obt : students[roll].subs[sub].oral + obt;
                    else if(mode.includes('practical')) students[roll].subs[sub].practical = students[roll].subs[sub].practical === '-' ? obt : students[roll].subs[sub].practical + obt;
                    else students[roll].subs[sub].written = students[roll].subs[sub].written === '-' ? obt : students[roll].subs[sub].written + obt;
                    allSubjects.add(sub);
                }
                let subsArray = Array.from(allSubjects).sort((a,b) => { let pA = customSubjectOrder.indexOf(a), pB = customSubjectOrder.indexOf(b); return (pA === -1 ? 999 : pA) - (pB === -1 ? 999 : pB); });
                let rolls = Object.keys(students).sort((a,b) => students[b].totalObt - students[a].totalObt);
                let rankMap = {}; let currentRank = 1;
                rolls.forEach((r, idx) => { if(idx > 0 && students[r].totalObt < students[rolls[idx-1]].totalObt) currentRank++; rankMap[r] = currentRank; });
                globalStudents = students; globalSubsArray = subsArray; globalRankMap = rankMap;
                let h = "<tr><th>ROLL</th>"; subsArray.forEach(sub => h += `<th>${sub.slice(0,3)}</th>`); h += "<th>MAX</th><th>OBT</th><th>%</th><th>RANK</th><th>VIEW</th></tr>"; document.getElementById('tHead').innerHTML = h;
                let b = ""; rolls.sort((a,b) => Number(a)-Number(b));
                rolls.forEach(roll => {
                    let s = students[roll];
                    b += `<tr class="${(s.totalObt/s.totalMax) < 0.33 ? 'fail-row' : ''}"><td>${roll}</td>`;
                    subsArray.forEach(sub => b += `<td>${s.subs[sub].obt}</td>`);
                    b += `<td>${s.totalMax}</td><td>${s.totalObt}</td><td>${((s.totalObt/s.totalMax)*100).toFixed(1)}%</td><td>#${rankMap[roll]}</td><td><button class="btn-small" onclick="viewIndividualReport('${roll}')">View</button></td></tr>`;
                });
                document.getElementById('tBody').innerHTML = b;
            } catch(e) { alert("Error!"); }
        }
        function viewIndividualReport(roll) {
            let s = globalStudents[roll];
            document.getElementById('irRoll').innerText = "Roll No: " + roll; document.getElementById('irTableBody').innerHTML = globalSubsArray.map(sub => `<tr><td>${sub}</td><td>${s.subs[sub].written}</td><td>${s.subs[sub].oral}</td><td>${s.subs[sub].practical}</td><td>${s.subs[sub].max}</td><td>${s.subs[sub].obt}</td></tr>`).join('');
            document.getElementById('irTotal').innerText = `Total: ${s.totalObt} / ${s.totalMax}`; document.getElementById('irRank').innerText = `Rank: #${globalRankMap[roll]}`;
            document.getElementById('dashMain').style.display = 'none'; document.getElementById('individualReportContainer').style.display = 'block';
            document.getElementById('btn-print-indv').style.display = currentId === "ADMIN" ? "inline-block" : "none";
        }
        function closeIndividualView() { document.getElementById('dashMain').style.display = 'block'; document.getElementById('individualReportContainer').style.display = 'none'; }
        function printConsolidated() { document.body.classList.add('print-cons'); window.print(); document.body.classList.remove('print-cons'); }
        function executeIndividualPrint() { document.body.classList.add('print-indv'); window.print(); document.body.classList.remove('print-indv'); }
        function switchTab(t) { document.querySelectorAll('.view-section').forEach(el=>el.classList.remove('active')); document.getElementById(t+'View').classList.add('active'); }
    </script>
</body>
</html>
