<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BG PUBLIC SCHOOL</title>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;600;700&family=Inconsolata:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --navy: #0a1628; --dark: #0e1f3d; --mid: #162d52; --card: #1a3460; --border: rgba(99,179,237,0.18); --gold: #f6c90e; --blue: #63b3ed; --white: #f7fafc; --red: #fc8181;}
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Georgia', serif; background: radial-gradient(ellipse at 30% 20%, #0d2137 0%, var(--navy) 60%); color: var(--white); min-height: 100vh; padding: 20px; }
        .card { background: var(--dark); padding: 30px; border: 1px solid rgba(246,201,14,.25); border-radius: 16px; box-shadow: 0 32px 80px rgba(0,0,0,.7); margin-bottom: 20px; }
        .school-logo { width: 100px; height: 100px; margin: 0 auto 20px; border-radius: 50%; background: var(--mid); border: 3px solid var(--gold); overflow: hidden; display: flex; align-items: center; justify-content: center; position: relative; }
        .logo-text { font-family: 'EB Garamond', serif; font-size: 22px; color: var(--gold); font-weight: bold; }
        .school-logo img { width: 100%; height: 100%; object-fit: cover; z-index: 2; position: absolute; display: none; }
        .btn-primary { width: 100%; padding: 14px; background: linear-gradient(135deg, var(--gold), #e6b800); color: var(--navy); border: none; border-radius: 8px; cursor: pointer; font-weight: 700; text-transform: uppercase; margin-top: 10px; transition: 0.2s;}
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(246,201,14,0.4); }
        .btn-primary:disabled { background: #555; color: #ccc; cursor: not-allowed; box-shadow: none; transform: none; }
        .app-shell { max-width: 1100px; margin: 0 auto; display: none; }
        .nav-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { padding: 10px 15px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 8px; color: #718096; cursor: pointer; }
        .tab-btn.active { background: var(--gold); color: var(--navy); font-weight: 700; }
        .view-section { display: none; }
        .view-section.active { display: block; }
        .control-group { display: flex; flex-direction: column; gap: 4px; margin-bottom: 15px; }
        .control-group label { font-size: 10px; color: var(--blue); text-transform: uppercase; font-weight: 700; }
        .control-group input, .control-group select { padding: 12px; background: var(--mid); border: 1px solid var(--border); border-radius: 6px; color: white; outline: none; font-family: 'Inconsolata', monospace; }
        #studentContainer { max-height: 400px; overflow-y: auto; background: var(--card); border: 1px solid var(--border); padding: 5px; border-radius: 6px; }
        .student-row { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.02); }
        .student-row input { width: 80px; padding: 6px; background: var(--dark); border: 1px solid var(--border); color: white; text-align: center; border-radius: 4px; }
        
        /* Table Styles */
        table { width: 100%; border-collapse: collapse; font-family: 'Inconsolata', monospace; margin-top: 20px; background: var(--card); border-radius: 8px; overflow: hidden; }
        th, td { padding: 10px; border: 1px solid var(--border); text-align: center; font-size: 13px; }
        th { background: var(--mid); color: var(--gold); text-transform: uppercase; }
        .highlight-col { background: rgba(246, 201, 14, 0.05); color: var(--gold); font-weight: bold; }
        .perc-col { background: rgba(99, 179, 237, 0.08); color: var(--blue); font-weight: bold; font-size: 14px; }
        .rank-col { background: rgba(252, 129, 129, 0.08); color: var(--red); font-weight: bold; font-size: 14px; }
        
        /* Professional Print Header Style */
        .print-only-header { display: none; text-align: center; color: black; margin-bottom: 25px; border-bottom: 3px double #000; padding-bottom: 15px; }
        .print-only-header h1 { font-family: 'EB Garamond', serif; font-size: 32px; font-weight: bold; margin-bottom: 5px; text-transform: uppercase; }
        .print-only-header h3 { font-size: 18px; letter-spacing: 1px; margin-bottom: 10px; color: #333; }
        .print-only-header p { font-size: 15px; font-weight: bold; font-family: monospace; }

        /* PRINT MEDIA LOGIC */
        @media print {
            body { background: white !important; color: black !important; padding: 0; }
            .no-print, .login-container, .nav-tabs, #loggedInUser, .btn-primary, style { display: none !important; }
            .card { background: transparent !important; border: none !important; box-shadow: none !important; padding: 0 !important; }
            .print-only-header { display: block !important; }
            #printableArea, #printableArea * { visibility: visible; }
            table { width: 100% !important; border: 2px solid #000 !important; background: white !important; margin-top: 10px !important; }
            th, td { border: 1px solid #000 !important; color: black !important; padding: 8px !important; }
            th { background: #f2f2f2 !important; color: black !important; }
            .highlight-col, .perc-col, .rank-col { background: transparent !important; color: black !important; }
        }
    </style>
</head>
<body>

<div class="login-container" id="loginPage" style="max-width:400px; margin: 60px auto;">
    <div class="card">
        <div class="school-logo">
            <span class="logo-text">BGPS</span>
            <img src="https://r2.erweima.ai/i/6f9765270597475d8da97ba987998be2.jpg" id="logoImg" onload="this.style.display='block'">
        </div>
        <h1 style="text-align:center; color:var(--gold); font-family:'EB Garamond'; font-size:24px; margin-bottom:20px;">BG PUBLIC SCHOOL</h1>
        <div class="control-group"><label>Teacher ID</label><input type="text" id="tid" placeholder="ADMIN, T-4, etc."></div>
        <div class="control-group"><label>Security PIN</label><input type="password" id="tpass" placeholder="bgps123"></div>
        <button class="btn-primary" onclick="loginTeacher()">Login</button>
    </div>
</div>

<div class="app-shell" id="appShell">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;" class="no-print">
        <div style="font-family:'EB Garamond'; color:var(--gold); font-size:22px; font-weight:bold;">BG PUBLIC SCHOOL</div>
        <div id="loggedInUser" style="color:var(--blue); font-size:12px;">User</div>
    </div>
    <div class="nav-tabs no-print">
        <button class="tab-btn active" id="tab-entry" onclick="switchTab('entry')">Marks Entry</button>
        <button class="tab-btn" id="tab-dash" onclick="switchTab('dash')">Dashboard</button>
        <button class="tab-btn" onclick="location.reload()" style="margin-left:auto; color:var(--red); border:none; background:transparent;">Logout</button>
    </div>

    <!-- Entry View Section -->
    <div class="card view-section active" id="entryView">
        <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px;">
            <div class="control-group"><label>Class</label><select id="class"></select></div>
            <div class="control-group">
                <label>Subject</label>
                <select id="subject">
                    <option value="">Select</option>
                    <option>English</option>
                    <option>English Language</option>
                    <option>English Literature</option>
                    <option>Hindi</option>
                    <option>Maths</option>
                    <option>Physics</option>
                    <option>Chemistry</option>
                    <option>Biology</option>
                    <option>History/Civics</option>
                    <option>Geography</option>
                    <option>Social Studies</option>
                    <option>Science</option>
                    <option>EVS</option>
                    <option>Account</option>
                    <option>Business</option>
                    <option>Economics</option>
                    <option>Computer</option>
                    <option>GK</option>
                </select>
            </div>
            <div class="control-group"><label>Exam</label><select id="examType"><option>Unit Test 1</option><option>Unit Test 2</option><option>Half Yearly</option><option>Unit Test 3</option><option>Annual Exam</option></select></div>
        </div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <div class="control-group"><label>Mode</label><select id="type"><option>Written</option><option>Oral</option><option>Practical</option></select></div>
            <div class="control-group"><label>Max Marks</label><input type="number" id="maxMarks" placeholder="e.g. 80"></div>
        </div>
        <div id="studentContainer"></div>
        <button class="btn-primary" onclick="submitData()" id="submitBtn">Submit Records</button>
    </div>

    <!-- Dashboard View Section -->
    <div class="card view-section" id="dashView">
        <div id="printableArea">
            <div id="printHeader" class="print-only-header">
                <h1>BG PUBLIC SCHOOL</h1>
                <h3>CONSOLIDATED PROGRESS REPORT SUMMARY</h3>
                <p id="pDetails">CLASS: -- | EXAM: --</p>
            </div>
            
            <div style="display:flex; gap:10px; margin-bottom:15px; align-items:flex-end;" class="no-print">
                <div class="control-group" style="flex:2; margin-bottom:0;"><label>Report Tab</label><select id="tabSelector"></select></div>
                <button class="btn-primary" onclick="fetchData()" style="flex:1; margin:0; padding:10px;" id="fetchBtn">Fetch</button>
                <button class="btn-primary" onclick="window.print()" style="flex:1; margin:0; padding:10px; background:#48bb78;">Print Report</button>
            </div>
            
            <div style="overflow-x:auto;">
                <table id="resTable">
                    <thead id="tHead"></thead>
                    <tbody id="tBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwoFAw_Dr-c8Uez79RLT7wbfVZ5xhqUUrFlqkcN5j4FYUsiUaaoYoC4H9tldaoxoGMZ/exec"; 
    const mapping = {"T-1":"Playgroup","T-2":"LKG","T-3":"UKG","T-4":"Class 1","T-5":"Class 2","T-6":"Class 3","T-7":"Class 4","T-8":"Class 5","T-9":"Class 6","T-10":"Class 7","T-11":"Class 8","T-12":"Class 9","T-13":"Class 10","T-14":"Class 11","T-15":"Class 12","ADMIN":"ALL_CLASSES"};
    let currentId = "";

    function loginTeacher() {
        let id = document.getElementById('tid').value.toUpperCase();
        let pass = document.getElementById('tpass').value;
        
        // ADMIN password is "Admin@1", Teachers password is "bgps123"
        if (((id === "ADMIN" && pass === "Admin@1") || (id !== "ADMIN" && pass === "bgps123")) && mapping[id]) {
            currentId = id;
            let myClass = mapping[id];
            document.getElementById('loggedInUser').innerText = id + " | " + (id === "ADMIN" ? "ADMIN" : myClass);
            
            const clsSelect = document.getElementById('class');
            const dashSelect = document.getElementById('tabSelector');
            
            let classesToLoad = id === "ADMIN" ? ["Playgroup", "LKG", "UKG", "Class 1", "Class 2", "Class 3", "Class 4", "Class 5", "Class 6", "Class 7", "Class 8", "Class 9", "Class 10", "Class 11", "Class 12"] : [myClass];
            
            let clsOptions = id === "ADMIN" ? "<option value=''>Class</option>" : "";
            let dashOptions = "<option value=''>Select Report</option>";
            
            classesToLoad.forEach(c => {
                clsOptions += `<option value="${c}">${c}</option>`;
                ["Unit Test 1", "Unit Test 2", "Half Yearly", "Unit Test 3", "Annual Exam"].forEach(ex => { 
                    dashOptions += `<option value="${c}|${ex}">${c} - ${ex}</option>`; 
                });
            });
            
            clsSelect.innerHTML = clsOptions; 
            dashSelect.innerHTML = dashOptions;
            
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('appShell').style.display = 'block';
            generateRows();
        } else { alert("Login Failed!"); }
    }

    function switchTab(t) {
        document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        if(t === 'entry') { document.getElementById('entryView').classList.add('active'); document.getElementById('tab-entry').classList.add('active'); }
        else { document.getElementById('dashView').classList.add('active'); document.getElementById('tab-dash').classList.add('active'); }
    }

    function generateRows() {
        let c = document.getElementById('studentContainer'); c.innerHTML = "";
        for(let i=1; i<=50; i++) {
            c.innerHTML += `<div class="student-row"><span>Roll No. ${i.toString().padStart(2, '0')}</span><input type="number" class="m-input" data-roll="${i}" placeholder="--"></div>`;
        }
    }

    async function submitData() {
        let entries = [];
        let sub = document.getElementById('subject').value, exam = document.getElementById('examType').value, comp = document.getElementById('type').value, max = document.getElementById('maxMarks').value, cls = document.getElementById('class').value;
        
        if(!sub || !max || !cls) return alert("Please fill Class, Subject and Max Marks!");
        
        document.querySelectorAll('.m-input').forEach(i => {
            if(i.value && i.value.trim() !== "") {
                entries.push({ teacherId: currentId, class: cls, subject: sub, examType: exam, type: comp, maxMarks: max, rollNo: i.dataset.roll, marks: i.value });
            }
        });
        
        if(entries.length === 0) return alert("No marks entered!");

        const btn = document.getElementById('submitBtn');
        
        // Block double clicks
        if(btn.disabled) return;
        
        btn.innerText = "Saving... Please Wait"; 
        btn.disabled = true;

        try {
            await fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(entries) });
            alert("SUCCESS: Records saved to server!");
            // Form clear
            document.querySelectorAll('.m-input').forEach(i => i.value = "");
        } catch(e) { 
            alert("Network Error! Try again."); 
        } finally {
            // Un-block button after 3 seconds
            setTimeout(() => {
                btn.innerText = "Submit Records"; 
                btn.disabled = false;
            }, 3000);
        }
    }

    async function fetchData() {
        let selection = document.getElementById('tabSelector').value; 
        if(!selection) return alert("Please select a report from the dropdown!");
        
        let [selectedClass, selectedExam] = selection.split('|');
        document.getElementById('pDetails').innerText = "CLASS: " + selectedClass.toUpperCase() + " | EXAM: " + selectedExam.toUpperCase();
        
        let fBtn = document.getElementById('fetchBtn');
        fBtn.innerText = "Fetching Data...";
        fBtn.disabled = true;

        try {
            let res = await fetch(WEB_APP_URL + "?tabName=Master");
            let rawData = await res.json();
            
            fBtn.innerText = "Fetch";
            fBtn.disabled = false;

            if(!rawData || rawData.error || rawData.length < 2) return alert("Sheet is empty or not found!");

            const cIdx = 2; const sIdx = 3; const eIdx = 4; const rIdx = 6; const oIdx = 7; const mIdx = 8;
            let students = {}; let allSubjects = new Set(); let hasData = false;

            for(let i = 1; i < rawData.length; i++) {
                let row = rawData[i]; if (!row) continue;
                if(String(row[cIdx]).trim() !== selectedClass || String(row[eIdx]).trim() !== selectedExam) continue;

                hasData = true;
                let roll = String(row[rIdx] || '').trim(); if(!roll || roll === '') continue; 
                
                let sub = String(row[sIdx] || 'UNKNOWN').toUpperCase().trim();
                let max = Number(row[mIdx]) || 0;
                let obt = Number(row[oIdx]) || 0;

                if(!students[roll]) { students[roll] = { subs: {}, totalMax: 0, totalObt: 0 }; }
                if(!students[roll].subs[sub]) { students[roll].subs[sub] = { max: 0, obt: 0 }; }

                students[roll].subs[sub].max += max;
                students[roll].subs[sub].obt += obt;
                students[roll].totalMax += max;
                students[roll].totalObt += obt;
                allSubjects.add(sub);
            }

            if(!hasData) return alert(`No marks found for ${selectedClass} - ${selectedExam}`);

            let subsArray = Array.from(allSubjects).sort();
            let rolls = Object.keys(students);
            rolls.sort((a,b) => students[b].totalObt - students[a].totalObt);
            let rankMap = {}; let currentRank = 1;
            
            rolls.forEach((r, index) => {
                if (index > 0 && students[r].totalObt < students[rolls[index-1]].totalObt) { currentRank++; }
                rankMap[r] = currentRank;
            });

            let h = "<tr><th>ROLL NO</th>";
            subsArray.forEach(sub => { h += `<th>${sub}</th>`; });
            h += "<th class='highlight-col'>MAX MARKS</th><th class='highlight-col'>TOTAL OBTAINED</th><th class='perc-col'>PERCENTAGE</th><th class='rank-col'>RANK</th></tr>";
            document.getElementById('tHead').innerHTML = h;

            let b = "";
            let displayRolls = Object.keys(students).sort((a,b) => Number(a) - Number(b));
            
            displayRolls.forEach(roll => {
                let s = students[roll];
                let p = s.totalMax > 0 ? ((s.totalObt / s.totalMax) * 100).toFixed(2) + "%" : "0%";
                b += `<tr><td>${roll}</td>`;
                subsArray.forEach(sub => { b += `<td>${s.subs[sub] !== undefined ? s.subs[sub].obt : '-'}</td>`; });
                b += `<td class='highlight-col'>${s.totalMax}</td><td class='highlight-col'>${s.totalObt}</td><td class='perc-col'>${p}</td><td class='rank-col'># ${rankMap[roll]}</td></tr>`;
            });
            document.getElementById('tBody').innerHTML = b;
            
        } catch(e) { 
            alert("Error fetching data."); 
            fBtn.innerText = "Fetch"; fBtn.disabled = false;
        }
    }
</script>
</body>
</html>
