<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BG PUBLIC SCHOOL | Admin ERP</title>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;600;700&family=Inconsolata:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --navy: #0a1628; --dark: #16355b; --mid: #2f5f91; 
            --card: #eaf4ff; --border: rgba(148, 184, 218, 0.55); 
            --gold: #f6c90e; --blue: #90cdf4; --white: #f7fafc; 
            --red: #fc8181; --green: #48bb78;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Georgia', serif; background: radial-gradient(ellipse at 30% 20%, #234d75 0%, #102a46 62%, #0a1628 100%); color: var(--white); min-height: 100vh; padding: 20px; }
        .card { background: rgba(22, 53, 91, 0.96); padding: 30px; border: 1px solid rgba(246,201,14,.28); border-radius: 16px; box-shadow: 0 24px 60px rgba(0,0,0,.45); margin-bottom: 20px; }
        .school-logo { width: 100px; height: 100px; margin: 0 auto 20px; border-radius: 50%; background: var(--mid); border: 3px solid var(--gold); overflow: hidden; display: flex; align-items: center; justify-content: center; position: relative; }
        .logo-text { font-family: 'EB Garamond', serif; font-size: 22px; color: var(--gold); font-weight: bold; }
        .btn-primary { width: 100%; padding: 14px; background: linear-gradient(135deg, var(--gold), #e6b800); color: var(--navy); border: none; border-radius: 8px; cursor: pointer; font-weight: 700; text-transform: uppercase; margin-top: 10px; transition: 0.2s;}
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(246,201,14,0.4); }
        .btn-small { background: var(--blue); color: var(--navy); border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 11px; text-transform: uppercase; }
        .app-shell { max-width: 1100px; margin: 0 auto; display: none; }
        .nav-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { padding: 10px 15px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 8px; color: #718096; cursor: pointer; }
        .tab-btn.active { background: var(--gold); color: var(--navy); font-weight: 700; }
        .view-section { display: none; }
        .view-section.active { display: block; }
        .control-group { display: flex; flex-direction: column; gap: 4px; margin-bottom: 15px; }
        .control-group label { font-size: 10px; color: var(--blue); text-transform: uppercase; font-weight: 700; }
        .control-group input, .control-group select { padding: 12px; background: var(--mid); border: 1px solid var(--border); border-radius: 6px; color: white; outline: none; font-family: 'Inconsolata', monospace; }
        #studentContainer { max-height: 400px; overflow-y: auto; background: #eaf4ff; color: #102a43; border: 1px solid #a9c7e3; padding: 5px; border-radius: 8px; }
        .student-row { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #c9dceb; font-weight: 700; }
        .student-row input { width: 80px; padding: 8px; background: #ffffff; border: 2px solid #7aa7cf; color: #0a1628; text-align: center; border-radius: 6px; font-size: 15px; font-weight: 800; }
        .fail-row td { background: #ffe8e8 !important; color: #7f1d1d !important; }
        .fail-row { border-left: 4px solid #dc2626 !important; }
        
        .analytics-panel { display: none; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-box { background: var(--mid); border: 1px solid var(--border); padding: 15px; border-radius: 8px; }
        .stat-box h4 { color: var(--gold); margin-bottom: 8px; font-size: 12px; text-transform: uppercase; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px; }
        .stat-box div, .stat-box p { font-size: 14px; color: var(--white); font-family: 'Inconsolata', monospace; margin-bottom: 3px; }
        .text-green { color: var(--green); font-weight: bold; }
        .text-red { color: var(--red); font-weight: bold; }

        table { width: 100%; border-collapse: collapse; font-family: 'Inconsolata', monospace; margin-top: 10px; background: #f8fbff; border-radius: 8px; overflow: hidden; }
        th, td { padding: 10px; border: 1px solid #b8cee2; text-align: center; font-size: 13px; }
        td { background: #f8fbff; color: #102a43; font-weight: 800; }
        tbody tr:nth-child(even) td { background: #eaf4ff; }
        th { background: #2f5f91; color: #ffffff; text-transform: uppercase; font-weight: 800; }
        .highlight-col { background: #fff5bf !important; color: #6b4f00 !important; font-weight: 900; }
        .perc-col { background: #d9f2ff !important; color: #075985 !important; font-weight: 900; font-size: 14px; }
        .rank-col { background: #ede9fe !important; color: #5b21b6 !important; font-weight: 900; }

        #individualReportContainer { display: none; margin-top: 30px; }
        #individualReport { background: #ffffff; color: #000000; padding: 30px; border: 3px solid var(--navy); border-radius: 12px; font-family: 'Georgia', serif; position: relative; box-shadow: 0 15px 40px rgba(0,0,0,0.5); }
        .ir-header { text-align: center; border-bottom: 3px solid var(--navy); padding-bottom: 15px; margin-bottom: 25px; }
        .ir-header h1 { font-family: 'EB Garamond', serif; font-size: 34px; margin: 0; color: var(--navy); font-weight: bold; text-transform: uppercase; }
        .ir-header h3 { font-size: 18px; margin: 8px 0 0 0; color: #b7791f; text-transform: uppercase; font-family: 'Segoe UI', sans-serif;}
        .ir-details { display: flex; justify-content: space-between; font-size: 16px; margin-bottom: 25px; font-weight: bold; background: #f0f4f8; padding: 15px 20px; border-radius: 8px; color: var(--navy); border: 1px solid #cbd5e1; }
        .ir-table { width: 100%; border-collapse: collapse; margin-bottom: 30px; background: #ffffff !important; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.03);}
        .ir-table th, .ir-table td { border: 1px solid #cbd5e1 !important; padding: 14px; text-align: center; }
        .ir-table th { background: var(--navy) !important; color: var(--gold) !important; font-size: 14px; letter-spacing: 1px;}
        .ir-table td { color: #1e293b !important; font-weight: 600; font-size: 15px;}
        .ir-table tr:nth-child(even) td { background: #f8fafc !important; }
        .ir-summary { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; font-family: 'Segoe UI', sans-serif;}
        .ir-box { border: 2px solid #cbd5e1; padding: 18px; text-align: center; font-weight: bold; background: #ffffff; color: var(--navy); font-size: 16px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.02);}
        .ir-footer { display: flex; justify-content: space-between; margin-top: 50px; font-size: 16px; font-weight: bold; color: var(--navy); }
        .sign-line { border-top: 2px solid var(--navy); width: 200px; text-align: center; padding-top: 8px; }
        
        .print-only-header { display: none; }
        .print-analytics-panel { display: none; }

        @page {
            size: A4 landscape;
            margin: 6mm;
        }

        @media print {
            html, body {
                width: 100% !important;
                background: white !important;
                color: black !important;
                padding: 0 !important;
                margin: 0 !important;
            }

            .no-print, .login-container, .nav-tabs, #loggedInUser, .btn-primary,
            .app-shell > div:not(.view-section.active) {
                display: none !important;
            }

            .app-shell, #dashView, #dashMain {
                display: block !important;
                width: 100% !important;
                max-width: none !important;
                margin: 0 !important;
                padding: 0 !important;
            }

            #dashView.card {
                border: none !important;
                box-shadow: none !important;
                background: white !important;
                padding: 0 !important;
                margin: 0 !important;
            }

            body.print-cons #dashMain { display: block !important; }
            body.print-cons #individualReportContainer { display: none !important; }
            body.print-indv #dashMain { display: none !important; }
            body.print-indv #individualReportContainer {
                display: block !important;
                padding: 0 !important;
                margin: 0 !important;
            }

            body.print-cons .print-only-header {
                display: block !important;
                text-align: center;
                margin: 0 0 6mm 0 !important;
                border-bottom: 2px solid #000;
                padding-bottom: 3mm;
            }

            body.print-cons .print-only-header h1 {
                font-family: 'EB Garamond', serif;
                font-size: 24px !important;
                line-height: 1.05;
                font-weight: bold;
                margin: 0 0 2px 0 !important;
                color: black !important;
            }

            body.print-cons .print-only-header h3 {
                font-size: 14px !important;
                line-height: 1.1;
                margin: 0 0 2px 0 !important;
            }

            body.print-cons .print-only-header p {
                font-size: 12px !important;
                font-weight: 700;
                margin: 0 !important;
            }

            body.print-cons #analyticsPanel {
                display: none !important;
            }

            body.print-cons #printAnalyticsPanel.print-analytics-panel {
                display: grid !important;
                grid-template-columns: 0.72fr 1fr 1.38fr !important;
                gap: 3mm !important;
                width: 100% !important;
                margin: 0 0 4mm 0 !important;
                padding: 0 !important;
                page-break-inside: avoid !important;
                break-inside: avoid !important;
            }

            body.print-cons #printAnalyticsPanel .stat-box {
                display: block !important;
                min-width: 0 !important;
                min-height: 23mm !important;
                background: #f4f7fb !important;
                color: #000 !important;
                border: 1.4px solid #334155
